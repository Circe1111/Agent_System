server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    location / { try_files $uri $uri/ /index.html; }
    location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; }

    location /api/ { proxy_pass http://backend:8000; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_buffering off; proxy_cache off; proxy_read_timeout 86400s; }
    location /user/ { proxy_pass http://backend:8000; }
    location /portrait/ { proxy_pass http://backend:8000; }
    location /conversation/ { proxy_pass http://backend:8000; }
    location /agent/ { proxy_pass http://backend:8000; proxy_buffering off; proxy_cache off; }
    location /health { proxy_pass http://backend:8000; }
    location /docs { proxy_pass http://backend:8000; }
    location /openapi.json { proxy_pass http://backend:8000; }
}
