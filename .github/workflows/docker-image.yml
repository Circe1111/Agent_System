name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build backend image
      run: docker build . --file docker/backend.Dockerfile --tag eduagent-backend:ci
    - name: Build frontend image
      run: docker build . --file docker/frontend.Dockerfile --tag eduagent-frontend:ci
