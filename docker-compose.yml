version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: edu_agent_backend
    ports:
      - "8000:8000"
    volumes:
      # 持久化数据库文件
      - backend_data:/app
      # 知识库数据挂载（方便热更新）
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./edu_agent.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edu_agent_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data: